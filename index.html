          "@type": "Question",

            "@type": "Answer",
            "text": "We serve local service businesses — HVAC contractors, plumbers, electricians, roofers, landscapers, auto repair shops, and any business that relies on phone calls and online customers."

          "@type": "Question",

          }
        },
        {
          "@type": "Question",
          "name": "What happens if the AI can't answer a question?",

            "@type": "Answer",
            "text": "The AI captures the caller's information and immediately notifies you via text and email so you can follow up personally. No customer is ever missed."
          }
        },
        {
          "@type": "Question",
          "name": "Is Vox.chat a lead generation service?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Vox.chat is AI automation for your business operations — we automate the calls, chats, and review follow-ups you're already getting so nothing falls through the cracks. We don't generate leads. We make sure the customers already trying to reach you get answered, booked, and followed up with — automatically."
          }
        },
        {
          "@type": "Question",
          "name": "Can I cancel anytime?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. There are no long-term contracts. You can cancel or pause your subscription at any time with no penalties."
          }
        }
      ]
    }
