<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background (full bleed — no warm band) -->
  <rect width="1200" height="630" fill="#E2E3E8"/>

  <!-- Subtle wave lines -->
  <path d="M0 280 Q150 220 300 260 T600 240 T900 270 T1200 240" stroke="#FF6B4A" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <path d="M0 260 Q180 300 350 250 T700 280 T1000 240 T1200 260" stroke="#4A9EFF" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <path d="M0 300 Q200 250 400 290 T750 260 T1050 290 T1200 270" stroke="#FFB84A" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>

  <!-- Three dots — logo mark, left aligned -->
  <circle cx="90" cy="150" r="12" fill="#FF6B4A"/>
  <circle cx="126" cy="150" r="12" fill="#4A9EFF"/>
  <circle cx="162" cy="150" r="12" fill="#FFB84A"/>

  <!-- Tagline left aligned (matches site hero) -->
  <text x="80" y="270" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#2E2E2E">Never miss a call, lead, </text>
  <text x="620" y="270" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#C45A30">or review.</text>

  <!-- Subtext -->
  <text x="82" y="330" font-family="monospace" font-size="17" fill="#7C7F88">AI answers your phone, captures website leads,</text>
  <text x="82" y="356" font-family="monospace" font-size="17" fill="#7C7F88">and gets you more Google reviews — 24/7.</text>

  <!-- Service pills left aligned -->
  <rect x="80" y="420" width="170" height="38" rx="8" fill="white" opacity="0.6"/>
  <rect x="80" y="420" width="170" height="38" rx="8" fill="none" stroke="#D2D3D9" stroke-width="1"/>
  <circle cx="100" cy="439" r="5" fill="#FF6B4A"/>
  <text x="112" y="444" font-family="monospace" font-size="12" font-weight="500" fill="#2E2E2E">AI Phone Agent</text>

  <rect x="266" y="420" width="185" height="38" rx="8" fill="white" opacity="0.6"/>
  <rect x="266" y="420" width="185" height="38" rx="8" fill="none" stroke="#D2D3D9" stroke-width="1"/>
  <circle cx="286" cy="439" r="5" fill="#4A9EFF"/>
  <text x="298" y="444" font-family="monospace" font-size="12" font-weight="500" fill="#2E2E2E">AI Receptionist</text>

  <rect x="467" y="420" width="175" height="38" rx="8" fill="white" opacity="0.6"/>
  <rect x="467" y="420" width="175" height="38" rx="8" fill="none" stroke="#D2D3D9" stroke-width="1"/>
  <circle cx="487" cy="439" r="5" fill="#FFB84A"/>
  <text x="499" y="444" font-family="monospace" font-size="12" font-weight="500" fill="#2E2E2E">AI Review Agent</text>

  <text x="82" y="520" font-family="monospace" font-size="14" fill="#7C7F88" opacity="0.5">vox.chat</text>
</svg>
